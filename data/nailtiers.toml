# french tips, dot-and-stripe mixes), Tier 3 = detailed hand-painted art.
# The gallery shows a matching "Tier N" badge on each photo. A photo with no
# entry here just shows no badge, so you can still drop in a new design without
# editing this file. Prices per tier live in [params.tiers] in config.toml.

