baseURL = 'https://nailsbyizzy.com'
title = 'Nails by Izzy'
enableEmoji = true

# No blog/tags on this site: skip taxonomy + RSS output.
disableKinds = ['taxonomy', 'term', 'RSS']

# Drop new nail photos into assets/gallery/ and they appear automatically,
# newest first. Prefix filenames with a number (e.g. 17-name.jpg) to order them.

# --- Nav menu ---
# Add a page here and it shows up in the nav (and the phone hamburger).
[[menu.main]]
  name   = "home"
  url    = "/"
  weight = 10
[[menu.main]]
  name   = "my nails"
  url    = "/gallery/"
  weight = 20
[[menu.main]]
  name   = "about"
  url    = "/about/"
  weight = 30
[[menu.main]]
  name   = "order"
  url    = "/order/"
  weight = 40
[[menu.main]]
  name   = "contact"
  url    = "/#contact"
  weight = 50

[params]
# --- Branding / copy (edit freely) ---
siteName    = "Nails by Izzy"
artistName  = "Izzy"
tagline     = "reusable handmade press-ons 💅"
heroButton  = "See my nails"
pricingNote = "All nail sets $8-$15! ✨"

aboutTitle = "hey, I'm Izzy!"
aboutText  = "I hand-paint every set myself, one tiny design at a time. Glitter tips, polka dots, flowers, little fruits, whatever you're into, I love making nails that feel like *you*. Message me and let's design your dream set!"
# aboutPhoto = "izzy.jpg"   # optional: drop a photo in assets/ and uncomment

# --- About Me page (/about/) ---
# Photos for the click-through carousel live in assets/about/ (sorted by name).
aboutMeTitle = "hi, I'm Izzy!"
aboutMeText  = "Hi, I'm Izzy! I'm a 13 year old girl who has a passion for making nails. When I'm not biking or making videos, I love to create press-ons!"

# --- My nails page (/gallery/) ---
galleryIntro = "These are some of the nails I have made! I price them in 3 tiers by how detailed they are. Not sure what you want? Pick one of the ready-made sets below and get **$2 off**!"

# --- Contact ---
email     = "nailsbyizzy@hotmail.com"
instagram = "_nails_by_izzy"

[params.footer]
text = "Made with 💖 by Izzy"

# --- Tier prices (shown on the my-nails page) ---
[params.tiers]
one       = "$8"
two       = "$12"
three     = "$15"
bundleOff = "$2"

# --- Order page (/order/) ---
[params.form]
# Google Form embed. The public share link ends in /viewform; embedding just
# adds ?embedded=true. (The raw /formResponse URL is the POST endpoint only.)
url = "https://docs.google.com/forms/d/e/1FAIpQLSee6nn9Mrrn1FDQv-a4aztJwpnX26Ppnl-ECZw572yQpVr3nA/viewform"

# How ordering works: numbered steps on the order page.
[[params.orderSteps]]
icon = "📝"
text = "You find my page and fill out the Google form below."
[[params.orderSteps]]
icon = "💬"
text = "We chat about the finishing details and your custom sizing."
[[params.orderSteps]]
icon = "🎨"
text = "You relax and wait while I make your custom set in 3 to 7 days!"
[[params.orderSteps]]
icon = "📦"
text = "I ship your package out to you. Enjoy!"

[markup.goldmark.renderer]
unsafe = true
