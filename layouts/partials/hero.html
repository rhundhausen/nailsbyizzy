<header class="hero" id="top">
  <div class="hero__deco" aria-hidden="true">
    <span>⭐</span><span>🩷</span><span>✨</span><span>⭐</span><span>💛</span><span>🩵</span>
  </div>
  <div class="hero__inner">
    <h1 class="wordmark">{{ .Site.Params.siteName }}</h1>
    <p class="hero__tag">{{ .Site.Params.tagline }}</p>
    <a class="btn btn--hero" href="#gallery">{{ .Site.Params.heroButton }} →</a>
  </div>
  <div class="hero__wave" aria-hidden="true"></div>
</header>
