<nav class="nav" id="nav">
  <a class="nav__brand" href="{{ "" | relURL }}">{{ .Site.Params.siteName }}</a>

  <button class="nav__burger" id="navBurger" type="button"
          aria-controls="navMenu" aria-expanded="false" aria-label="Menu">
    <span class="nav__bar" aria-hidden="true"></span>
    <span class="nav__bar" aria-hidden="true"></span>
    <span class="nav__bar" aria-hidden="true"></span>
  </button>

  <ul class="nav__menu" id="navMenu">
    {{ $page := . }}
    {{ range .Site.Menus.main }}
      {{ $current := and (not (strings.Contains .URL "#")) (eq ($.RelPermalink | strings.TrimSuffix "/") (.URL | relURL | strings.TrimSuffix "/")) }}
      <li class="nav__item">
        <a class="nav__link{{ if $current }} is-current{{ end }}" href="{{ .URL | relURL }}"
           {{ if $current }}aria-current="page"{{ end }}>{{ .Name }}</a>
      </li>
    {{ end }}
  </ul>
</nav>
